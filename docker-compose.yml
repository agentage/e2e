services:
  couchdb:
    image: couchdb:3.4
    container_name: agentage-e2e-couchdb
    environment:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: agentage
    # JWT auth (mirrors the deployed sync-db) so the sync-bootstrap test can
    # exercise per-tenant bearer tokens. Basic auth still works via the default
    # handler, so the Basic-creds sync.test.ts is unaffected.
    # NOT :ro — the couchdb entrypoint chowns etc/ at startup and a read-only
    # mount makes it exit 1. The file is config, never written by CouchDB.
    volumes:
      - ./scripts/e2e/sync-jwt.ini:/opt/couchdb/etc/local.d/sync-jwt.ini
    ports:
      - '5984:5984'
    healthcheck:
      test: ['CMD-SHELL', 'curl -fs http://localhost:5984/_up || exit 1']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  couchdb-init:
    image: curlimages/curl:8.11.0
    depends_on:
      couchdb:
        condition: service_healthy
    restart: 'no'
    entrypoint: ['/bin/sh']
    command:
      - '-c'
      - |
        set -eu
        A=http://admin:agentage@couchdb:5984
        curl -fsS -X PUT "$$A/_node/_local/_config/httpd/enable_cors" -H 'Content-Type: application/json' -d '"true"' >/dev/null
        curl -fsS -X PUT "$$A/_node/_local/_config/cors/origins" -H 'Content-Type: application/json' -d '"app://obsidian.md,capacitor://localhost,http://localhost"' >/dev/null
