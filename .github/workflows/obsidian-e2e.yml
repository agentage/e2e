name: Obsidian E2E

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

concurrency:
  group: obsidian-e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  obsidian:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      couchdb:
        image: couchdb:3.4
        env:
          COUCHDB_USER: admin
          COUCHDB_PASSWORD: agentage
        ports:
          - 5984:5984
        options: >-
          --health-cmd "curl -fs http://localhost:5984/_up || exit 1"
          --health-interval 5s --health-timeout 3s --health-retries 10

    env:
      COUCHDB_URL: http://localhost:5984
      COUCHDB_USER: admin
      COUCHDB_PASS: agentage
      COUCHDB_DB: agentage-memory

    steps:
      - name: Checkout e2e repo
        uses: actions/checkout@v6

      - name: Checkout agentage/obsidian-memory (plugin source)
        uses: actions/checkout@v6
        with:
          repository: agentage/obsidian-memory
          path: obsidian-memory
          token: ${{ secrets.OBSIDIAN_MEMORY_PAT }}

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install e2e deps
        run: npm ci

      - name: Build obsidian-memory plugin
        working-directory: obsidian-memory
        run: |
          npm ci
          npm run build

      - name: Enable CouchDB CORS for the Obsidian origin
        run: |
          A=http://admin:agentage@localhost:5984
          curl -fsS -X PUT "$A/_node/_local/_config/httpd/enable_cors" -H 'Content-Type: application/json' -d '"true"'
          curl -fsS -X PUT "$A/_node/_local/_config/cors/origins" -H 'Content-Type: application/json' -d '"app://obsidian.md,capacitor://localhost,http://localhost"'

      - name: Install Obsidian + Xvfb + WM
        run: ./scripts/e2e/install-obsidian.sh

      - name: Start Xvfb + window manager
        run: ./scripts/e2e/start-display.sh

      - name: Set up test vault
        env:
          PLUGIN_ROOT: ${{ github.workspace }}/obsidian-memory
        run: ./scripts/e2e/setup-vault.sh

      - name: Run Obsidian e2e
        env:
          OBSIDIAN_BIN: /opt/Obsidian/obsidian
          OBSIDIAN_VAULT: /tmp/obsidian-test-vault
        run: npx playwright test --project=obsidian

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: obsidian-e2e-report
          retention-days: 7
          path: |
            playwright-report/
            test-results/
